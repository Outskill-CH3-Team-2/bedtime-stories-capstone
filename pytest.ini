[pytest]
pythonpath = .
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests

# Added -p no:warnings to silence unrelated library warnings if you want cleaner output
addopts = -v -s --tb=short

filterwarnings =
    ignore:Unknown config option. asyncio_mode:pytest.PytestConfigWarning

markers =
    requires_key: tests that need a real OPENROUTER_API_KEY
    integration: full end-to-end integration tests (slow, costs money)
    asyncio: mark test as async (handled by mode=auto, but good for clarity)