characters:
  - name: "Barnaby the Rabbit"
    instrument: "Upbeat stride piano"
    vocal: "Cheerful, high-pitched male child-voice"
    lesson_specialty: "Hygiene, routines, and attention to detail"
  - name: "Wolfgang the Wolf"
    instrument: "Steady acoustic folk guitar"
    vocal: "Warm, grounding baritone"
    lesson_specialty: "Patience, steady breathing, and calm"
  - name: "Elara the Elephant"
    instrument: "Triumphant jazz trumpet"
    vocal: "Soulful, powerful mezzo-soprano"
    lesson_specialty: "Bravery, confidence, and big milestones"
  - name: "Boris the Bear"
    instrument: "Deep, woody contrabass"
    vocal: "Low, rumbling bass"
    lesson_specialty: "Safety, comfort, and winding down for sleep"
  - name: "Luna the Fox"
    instrument: "Bright pizzicato violin"
    vocal: "Soft, whispery soprano"
    lesson_specialty: "Empathy, sharing, and noticing others' feelings"
  - name: "Rina the Rhino"
    instrument: "Rhythmic djembe and percussion"
    vocal: "Strong, steady contralto"
    lesson_specialty: "Helping others and physical strength"
  - name: "Pip the Penguin"
    instrument: "Playful slide whistle and flute"
    vocal: "Fast-talking, energetic child-voice"
    lesson_specialty: "Politeness and asking before taking"