
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dream Weaver</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background-color: #1a1008;
      font-family: 'Crimson Text', serif;
      color: #2c1810;
    }

    .font-cinzel { font-family: 'Cinzel', serif; }

    /* ── Open-book background image ── */
    .book-bg {
      background-image: url('/background_02.png');
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-position: center;
    }

    /* Semi-transparent paper tint over page areas */
    .page-paper {
      background-color: rgba(245, 237, 210, 0.45);
    }

    /* Drop shadow on the whole book */
    .book-shadow {
      filter:
        drop-shadow(0 40px 60px rgba(0,0,0,0.85))
        drop-shadow(0 10px 20px rgba(0,0,0,0.5));
    }

    /* ── Page flip 3D card ──────────────────────────────────────
     *  The card overlays the right page at rest (opacity 0).
     *  When .flipping is added, it fades in and rotates from
     *  rotateY(0°) → rotateY(-180°) to simulate turning the page.
     *  transform-origin: left center  →  hinge at the spine.
     * ──────────────────────────────────────────────────────── */
    .page-flip-card {
      transform: rotateY(0deg);
      opacity: 0;
      /* After the flip finishes, hide the card instantly */
      transition:
        transform 1.0s cubic-bezier(0.645, 0.045, 0.355, 1.000),
        opacity   0s   linear 1.0s;
    }
    .page-flip-card.flipping {
      opacity: 1;
      transform: rotateY(-180deg);
      /* Show card immediately, start rotating at once */
      transition:
        transform 1.0s cubic-bezier(0.645, 0.045, 0.355, 1.000),
        opacity   0s   linear 0s;
    }

    /* Front and back faces of the flip card */
    .flip-front, .flip-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .flip-front {
      background: linear-gradient(135deg, #f5edd8 0%, #e8dab8 60%, #d4c48a 100%);
      box-shadow: inset -8px 0 16px rgba(0,0,0,0.12);
    }
    .flip-back {
      background: linear-gradient(225deg, #e0d0a8 0%, #c8b880 100%);
      transform: rotateY(180deg);
      box-shadow: inset 8px 0 16px rgba(0,0,0,0.12);
    }

    /* Shadow sweep that moves across the page face during turn */
    .flip-shadow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: linear-gradient(to left, rgba(0,0,0,0.30) 0%, transparent 65%);
      opacity: 0;
      transition: opacity 1.0s ease;
      z-index: 2;
    }
    .page-flip-card.flipping .flip-shadow {
      opacity: 1;
    }

    /* Custom scrollbar */
    .custom-scrollbar::-webkit-scrollbar { width: 3px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(139,69,19,0.05); }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(139,69,19,0.3); border-radius: 10px; }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn { animation: fadeIn 0.7s ease-out forwards; }

    @keyframes fadeInDelay {
      0%, 40% { opacity: 0; transform: translateY(8px); }
      100%     { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeInDelay { animation: fadeInDelay 1.2s ease-out forwards; }

    /* Choice buttons — ink wipe effect on hover */
    .ink-button {
      position: relative;
      overflow: hidden;
      transition: all 0.25s ease;
      border: 1px solid rgba(139,69,19,0.28);
      border-radius: 2px;
    }
    .ink-button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: #3d1f0d;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
      z-index: 0;
    }
    .ink-button:not(:disabled):hover::before { transform: scaleX(1); }
    .ink-button > * { position: relative; z-index: 1; }
    .ink-button:not(:disabled):hover { color: #f2e8cf; border-color: #3d1f0d; }
    .ink-button:disabled { pointer-events: none; }

    /* Loading spinner ring */
    .spin-ring {
      width: 52px; height: 52px;
      border: 3px solid rgba(242,232,200,0.15);
      border-top-color: rgba(242,232,200,0.8);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

      /* Drop cap — first letter of story paragraph */
      .first-letter-drop::first-letter {
        font-family: 'Cinzel', serif;
        font-size: 2.6em;
        line-height: 0.78;
        float: left;
        margin-right: 3px;
        margin-top: 3px;
        color: #3d1f0d;
      }

      /* Small spinner for intro status badge */
      .spin-ring-sm {
        width: 10px; height: 10px;
        border: 2px solid rgba(242,232,200,0.15);
        border-top-color: rgba(242,232,200,0.7);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        flex-shrink: 0;
      }

      /* Dark icon button (play/pause/restart on intro) */
      .ink-btn-dark {
        background: rgba(61,31,13,0.85);
        color: #f2e8cf;
        border: 1px solid rgba(242,232,207,0.18);
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: background 0.2s, transform 0.15s;
      }
      .ink-btn-dark:hover { background: #3d1f0d; transform: scale(1.08); }
      .ink-btn-dark:active { transform: scale(0.96); }

      /* Audio waveform bars */
    @keyframes waveBar {
      0%, 100% { height: 3px; }
      50%       { height: 16px; }
    }
    .wave-bar {
      width: 3px;
      background: #8b4513;
      border-radius: 2px;
      height: 3px;
      transition: height 0.2s;
    }
    .wave-bar.playing {
      animation: waveBar 0.6s ease-in-out infinite;
    }

    /* ═══════════════════════════════════════════════════════════════
       PAGE-FLIP (StPageFlip) page styles
       Each scene gets two .pf-page divs: left (illustration) + right (text)
       These are rendered by StPageFlip onto its canvas with physics bending.
    ═══════════════════════════════════════════════════════════════ */

    /* StPageFlip injects its own wrapper — make sure the container fits */
    .pf-book-container { position: relative; }
    .pf-book-container .stf__parent { width: 100% !important; height: 100% !important; }

      /* Individual page base — TRANSPARENT so the book background image shows through */
      .pf-page {
        width: 100%;
        height: 100%;
        background: transparent;
        box-sizing: border-box;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      /* ── LEFT PAGE ── */
      .pf-page-left { background: transparent; }
      .pf-left-inner {
        display: flex;
        flex-direction: column;
        height: 100%;
        /* Small padding to clear decorative border ornaments */
        padding: 6% 8% 4% 14%;
        gap: 3%;
        box-sizing: border-box;
      }
      .pf-illustration-frame {
        flex: 1 1 0;
        min-height: 0;
        overflow: hidden;
        border-radius: 2px;
        box-shadow: 0 3px 16px rgba(0,0,0,0.25), inset 0 0 0 2px rgba(61,31,13,0.10);
      }
      .pf-illustration-frame img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .pf-no-image {
        width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        font-size: 28px; color: rgba(139,69,19,0.25);
      }
      .pf-chapter-label {
        font-family: 'Cinzel', serif;
        font-size: 7px;
        color: rgba(139,69,19,0.50);
        text-transform: uppercase;
        letter-spacing: 0.3em;
        text-align: center;
        margin: 0;
        flex-shrink: 0;
      }

      /* ── RIGHT PAGE ── */
      .pf-page-right { background: transparent; }
      .pf-right-inner {
        display: flex;
        flex-direction: column;
        height: 100%;
        /*
          The pf-book-container is already inset to the inner page area.
          Only a small additional margin is needed to clear the decorative
          border ornaments inside the page — roughly 5% on all sides,
          plus a little extra on the left (spine side) and right (outer edge).
          Keep horizontal padding tight so text uses 75% of available width.
        */
        padding: 6% 14% 4% 8%;
        gap: 0;
        overflow: hidden;
        box-sizing: border-box;
      }
      .pf-story-title {
        font-family: 'Cinzel', serif;
        font-size: clamp(11px, 1.3vw, 16px);
        color: #1a0f0a;
        margin: 0 0 0.5em 0;
        padding-bottom: 0.3em;
        border-bottom: 1px solid rgba(61,31,13,0.18);
        line-height: 1.2;
        flex-shrink: 0;
      }
      .pf-story-text {
        /* Takes available space between title and choices */
        flex: 1 1 0;
        overflow: hidden;
      }
      .pf-drop-cap {
        font-family: 'Crimson Text', serif;
        font-size: clamp(12px, 1.35vw, 16px);
        color: #2c1810;
        line-height: 1.68;
        text-align: justify;
        font-style: italic;
        margin: 0;
      }
      .pf-drop-cap::first-letter {
        font-family: 'Cinzel', serif;
        font-size: 2.4em;
        line-height: 0.78;
        float: left;
        margin-right: 4px;
        margin-top: 5px;
        color: #3d1f0d;
      }
      .pf-choices-block {
        flex-shrink: 0;
        /* Fixed space from bottom — choices always ~25% from bottom of inner area */
        padding-top: 2%;
        padding-bottom: 2%;
        border-top: 1px solid rgba(61,31,13,0.12);
      }
      .pf-choices-label {
        font-family: 'Cinzel', serif;
        font-size: clamp(6px, 0.6vw, 8px);
        color: rgba(139,69,19,0.50);
        text-transform: uppercase;
        letter-spacing: 0.3em;
        text-align: center;
        margin: 0 0 4% 0;
      }
      .pf-choices-list {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      /* Choice buttons — clean; ready = normal, not-ready = dimmed */
      .pf-choice-btn {
        width: 100%;
        text-align: left;
        padding: 5px 9px;
        background: transparent;
        border: 1px solid rgba(139,69,19,0.28);
        border-radius: 2px;
        font-family: 'Crimson Text', serif;
        font-size: clamp(11px, 1.15vw, 14px);
        color: #2c1810;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 7px;
        transition: background 0.15s, border-color 0.15s;
      }
      .pf-choice-btn:hover:not(:disabled) {
        background: rgba(139,69,19,0.07);
        border-color: rgba(139,69,19,0.50);
      }
      .pf-choice-btn:focus:not(:disabled),
      .pf-choice-btn:active:not(:disabled) {
        background: rgba(139,69,19,0.11);
        border-color: #8b4513;
        border-left-width: 3px;
        outline: none;
      }
      .pf-choice-btn:disabled,
      .pf-choice-btn.pf-choice-disabled {
        opacity: 0.38;
        cursor: not-allowed;
        pointer-events: none;
      }
      .pf-choice-bullet {
        color: rgba(139,69,19,0.45);
        font-size: 0.85em;
        flex-shrink: 0;
      }
      .pf-choice-text { flex: 1; }
      .pf-choice-pending {
        font-size: 0.7em;
        color: rgba(139,69,19,0.4);
        flex-shrink: 0;
        animation: spin 1.5s linear infinite;
        display: inline-block;
      }

      /* Ending */
      .pf-ending { text-align: center; padding-top: 6%; }
      .pf-ending-rule {
        width: 30px; height: 1px;
        background: rgba(139,69,19,0.3);
        margin: 0 auto 8px;
      }
      .pf-ending-title {
        font-family: 'Cinzel', serif;
        font-size: clamp(13px, 1.5vw, 19px);
        color: #3d1f0d;
        margin: 0;
      }

      /* Audio button */
      .pf-audio-btn {
        width: 28px; height: 28px;
        border-radius: 50%;
        background: rgba(61,31,13,0.75);
        color: #f2e8cf;
        border: none;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 2px 8px rgba(0,0,0,0.35);
        transition: transform 0.15s, background 0.15s;
        flex-shrink: 0;
      }
      .pf-audio-btn:hover { background: #3d1f0d; transform: scale(1.1); }

      /* Waveform bars */
      .pf-wave-bars { display: flex; gap: 3px; align-items: flex-end; height: 18px; }
      .pf-wave-bar {
        width: 3px;
        background: rgba(242,232,207,0.7);
        border-radius: 2px;
        height: 3px;
      }
      .pf-wave-bar.playing { animation: waveBar 0.6s ease-in-out infinite; }
  </style>
