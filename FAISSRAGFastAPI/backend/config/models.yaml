# backend/config/models.yaml
# OpenRouter model identifiers and generation parameters for Story Weaver

text:
  model: "openai/gpt-4o"          # OpenRouter requires provider/model format
  temperature: 0.85
  max_tokens: 1500                 # Each scene is 3-4 sentences (~300-600 tokens)
  fallback_model: "anthropic/claude-haiku-4-5"

safety:
  model: "openai/gpt-4o-mini"
  temperature: 0.0
  max_tokens: 300                  # Safety JSON response is small

image:
  model: "dall-e-3"                # Used via OpenAI direct client (images.generate)
  size: "1024x1024"
  quality: "standard"
  style: "vivid"

tts:
  model: "tts-1"                   # Used via OpenAI direct client (audio.speech)
  voice: "onyx"
  director: "openai/gpt-4o-mini"   # Text enrichment via OpenRouter
