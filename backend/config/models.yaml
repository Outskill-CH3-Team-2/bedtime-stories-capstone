# backend/config/models.yaml
# OpenRouter model identifiers and generation parameters for Story Weaver

text:
  model: "gpt-4o"
  temperature: 0.85
  max_tokens: 5000
  # Fallback if primary unavailable
  fallback_model: "anthropic/claude-haiku-4-5"

safety:
  model: "openai/gpt-4o-mini"
  temperature: 0.0
  max_tokens: 5000

image:
  model: "google/gemini-2.5-flash-image"
  size: "1024x1024"
  quality: "standard"
  style: "vivid"

tts:
  model: "openai/gpt-4o-audio-preview"
  voice: "onyx"
